<ng-container
	*ngIf="{
		posts: wordpressService.posts$ | async,
		apiready: sketchfabService.apiready$ | async,
		postMetaFields: wordpressService.postMetaFields$ | async,
		viewersReady: viewersReady$ | async,
		lightStates: sketchfabService.lightStates$ | async,
		allLoaded: allLoaded$ | async,
		selectedSketchfabService: sketchfabService.selectedSketchfabService$ | async,
		sketchfabServices: sketchfabServices$ | async,
		annotationDescription: annotationDescription$ | async,
		annotationHeading: annotationHeading$ | async,
		selectedLanguage: selectedLanguage$ | async,
		helpInfoHeading: helpInfoHeading$ | async,
		helpInfoText: helpInfoText$ | async,
		showClickableLayer: showClickableLayer$ | async
	} as source"
>
	<!-- loading screen -->
	<div class="loading-screen" *ngIf="!source.allLoaded">
		{{ source.viewersReady }}
	</div>

	<!-- Viewer -->
	<div class="viewer">
		<ul>
			<li *ngFor="let post of source.posts; let i = index" class="wp-post">
				<div
					*ngIf="source.selectedSketchfabService && source.showClickableLayer"
					#spinningLayer
					class="clickable-layer"
					(click)="stopSpinning(source.selectedSketchfabService)"
				></div>

				<div
					*ngIf="
						source.allLoaded &&
						(source.selectedSketchfabService?.textureQuality$ | async) === 'LD' &&
						source.selectedSketchfabService?.modelIndex === i
					"
					class="load-texture-layer"
				></div>

				<div class="sketchfab-embed-wrapper">
					<iframe id="viewerRef-{{ i }}" #viewerRef src="" frameborder="0" allowfullscreen="" mozallowfullscreen="true"></iframe>
				</div>
			</li>
		</ul>
	</div>

	<!-- Menu -->
	<ng-container *ngIf="source.sketchfabServices">
		<app-menu [sketchfabServices]="source.sketchfabServices"></app-menu>
	</ng-container>

	<!-- <app-annotation-nav></app-annotation-nav> -->
</ng-container>
