<ng-container *ngIf="{
	posts: wordpressService.posts$ | async,
	apiready: sketchfabService.apiready$ | async,
	postMetaFields: wordpressService.postMetaFields$ | async,
	viewersReady: viewersReady$ | async
} as source">

<div class="viewer" id="viewer">
	<ul #postContainer *ngFor="let post of source.posts">
		<li id="t-{{post.id}}" class="wp-post" >
			post id: {{post.id}}
			<div class="sketchfab-embed-wrapper">
				<iframe id="api-frame-{{post.id}}" src="" frameborder="0" allowfullscreen="" mozallowfullscreen="true"></iframe>
			</div>
		</li>
	</ul>
</div>

Number of: {{source.posts?.length | json}}
viewersReady: {{source.viewersReady | json}}


<ng-container *ngIf= source.postMetaFields >
	postMetaFields: <pre>{{source.postMetaFields[1] | json}}</pre>
</ng-container>


<ul class="menu-nav">
	<li *ngFor="let post of source.posts"  >
		<img (click)="test()" src="{{baseUrl}}/wp-content/uploads/{{post.slug}}.png" fallback="../../assets/{{post.slug}}.png" alt="{{baseUrl}}/wp-content/uploads/{{post.slug}}.png" >

	</li>
	<li>

	</li>
</ul>

<p>
  viewer works!
</p>

<app-menu></app-menu>

<app-annotation-nav></app-annotation-nav>

</ng-container>
